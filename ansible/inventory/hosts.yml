all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3
  children:
    k8s_cluster:
      children:
        k8s_masters:
        k8s:workers:

    k8s_masters:
      hosts:
        master:
          ansible_host: 10.184.0.131
          
    k8s_workers:
      children:
        staging:
        production:

    staging:
      hosts:
        worker-staging:
          ansible_host: 10.184.0.130
    production:
      hosts:
        worker-production:
          ansible_host: 10.184.0.132
