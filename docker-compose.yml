services:
  weather:
    image: atsova15/weather:latest
    build: .
    env_file:
      - .env.example
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8000}/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
